<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <clipPath id="circ">
      <circle cx="24" cy="24" r="23"/>
    </clipPath>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="bg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Dark circular background -->
  <circle cx="24" cy="24" r="23.5" fill="#07111a"/>
  <circle cx="24" cy="24" r="23.5" stroke="rgba(34,211,238,0.18)" stroke-width="0.7"/>

  <g clip-path="url(#circ)">
    <!-- Left strand: displaced left + rotated CCW, flying apart -->
    <g filter="url(#g)" transform="translate(-4,0) rotate(-14,14,24)">
      <path d="M18,5 C9,10 9,18 18,24 C27,30 27,38 18,43"
            stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="18" cy="5"  r="2.4" fill="#4ade80"/>
      <circle cx="9"  cy="14" r="1.9" fill="#4ade80" opacity="0.85"/>
      <circle cx="18" cy="24" r="1.9" fill="#4ade80" opacity="0.65"/>
      <circle cx="27" cy="34" r="1.9" fill="#4ade80" opacity="0.85"/>
      <circle cx="18" cy="43" r="2.4" fill="#4ade80"/>
    </g>

    <!-- Right strand: displaced right + rotated CW, flying apart -->
    <g filter="url(#g)" transform="translate(4,0) rotate(14,34,24)">
      <path d="M30,5 C39,10 39,18 30,24 C21,30 21,38 30,43"
            stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="30" cy="5"  r="2.4" fill="#4ade80"/>
      <circle cx="39" cy="14" r="1.9" fill="#4ade80" opacity="0.85"/>
      <circle cx="30" cy="24" r="1.9" fill="#4ade80" opacity="0.65"/>
      <circle cx="21" cy="34" r="1.9" fill="#4ade80" opacity="0.85"/>
      <circle cx="30" cy="43" r="2.4" fill="#4ade80"/>
    </g>

    <!-- Top rung: intact, nudged upward -->
    <g filter="url(#g)" transform="translate(0,-2)">
      <line x1="13" y1="14" x2="35" y2="14" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="13" cy="14" r="2.1" fill="#4ade80"/>
      <circle cx="35" cy="14" r="2.1" fill="#4ade80"/>
    </g>

    <!-- Bottom rung: intact, nudged downward -->
    <g filter="url(#g)" transform="translate(0,2)">
      <line x1="13" y1="34" x2="35" y2="34" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="13" cy="34" r="2.1" fill="#4ade80"/>
      <circle cx="35" cy="34" r="2.1" fill="#4ade80"/>
    </g>

    <!-- Broken middle rung: left half flying upper-left -->
    <g filter="url(#g)" transform="translate(-7,-3) rotate(-28,14,24)">
      <line x1="9" y1="24" x2="21" y2="24" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
      <circle cx="9" cy="24" r="2" fill="#4ade80"/>
    </g>

    <!-- Broken middle rung: right half flying lower-right -->
    <g filter="url(#g)" transform="translate(7,3) rotate(28,34,24)">
      <line x1="27" y1="24" x2="39" y2="24" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
      <circle cx="39" cy="24" r="2" fill="#4ade80"/>
    </g>

    <!-- Explosion glow at break point -->
    <circle cx="24" cy="24" r="5" fill="rgba(34,211,238,0.35)" filter="url(#bg)"/>
    <circle cx="24" cy="24" r="2.2" fill="white" opacity="0.9" filter="url(#g)"/>

    <!-- Scattered nucleotide fragments -->
    <circle cx="20" cy="20" r="1"   fill="#4ade80" opacity="0.75"/>
    <circle cx="28" cy="28" r="1"   fill="#4ade80" opacity="0.75"/>
    <circle cx="27" cy="20" r="0.8" fill="#22d3ee" opacity="0.65"/>
    <circle cx="21" cy="28" r="0.8" fill="#22d3ee" opacity="0.65"/>
  </g>
</svg>
