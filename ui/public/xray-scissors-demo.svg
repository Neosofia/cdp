<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" role="img" aria-label="Demo abdominal X-ray showing retained surgical scissors">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="48%" r="72%">
      <stop offset="55%" stop-color="#2a2a2a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <linearGradient id="film" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="50%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="bone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.12 0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="overlay"/>
    </filter>
  </defs>
  <rect width="480" height="560" fill="url(#film)"/>
  <rect width="480" height="560" fill="url(#vignette)"/>
  <g filter="url(#grain)" opacity="0.95">
    <ellipse cx="240" cy="280" rx="168" ry="210" fill="#3d3d3d" opacity="0.55"/>
    <ellipse cx="195" cy="248" rx="42" ry="28" fill="#141414" opacity="0.65"/>
    <ellipse cx="285" cy="272" rx="36" ry="22" fill="#121212" opacity="0.55"/>
    <ellipse cx="220" cy="318" rx="48" ry="26" fill="#101010" opacity="0.5"/>
    <path d="M88 118 Q240 72 392 118 L392 145 Q240 108 88 145 Z" fill="#4a4a4a" opacity="0.35"/>
    <path d="M85 130 Q240 90 395 130" fill="none" stroke="url(#bone)" stroke-width="2.2" opacity="0.6"/>
    <path d="M90 152 Q240 112 390 152" fill="none" stroke="url(#bone)" stroke-width="2" opacity="0.58"/>
    <path d="M95 174 Q240 134 385 174" fill="none" stroke="url(#bone)" stroke-width="1.9" opacity="0.56"/>
    <path d="M100 196 Q240 156 380 196" fill="none" stroke="url(#bone)" stroke-width="1.8" opacity="0.54"/>
    <path d="M105 218 Q240 178 375 218" fill="none" stroke="url(#bone)" stroke-width="1.7" opacity="0.52"/>
    <path d="M110 240 Q240 200 370 240" fill="none" stroke="url(#bone)" stroke-width="1.6" opacity="0.5"/>
    <rect x="232" y="108" width="16" height="300" fill="url(#bone)" opacity="0.35" rx="4"/>
    <path d="M128 380 Q168 468 240 498 Q312 468 352 380 Q240 372 128 380 Z" fill="none" stroke="url(#bone)" stroke-width="3.5" opacity="0.65"/>
    <g transform="translate(278 195) rotate(22)">
      <path d="M0 0 L-3 52 Q0 58 3 52 Z" fill="url(#metal)" opacity="0.95"/>
      <path d="M0 0 L-3 -48 Q0 -54 3 -48 Z" fill="url(#metal)" opacity="0.95"/>
      <ellipse cx="-14" cy="-52" rx="9" ry="11" fill="none" stroke="#f5f5f5" stroke-width="2.8" opacity="0.9"/>
      <ellipse cx="14" cy="56" rx="9" ry="11" fill="none" stroke="#f5f5f5" stroke-width="2.8" opacity="0.9"/>
      <circle cx="0" cy="0" r="4" fill="#d0d0d0"/>
    </g>
  </g>
  <text x="428" y="36" fill="#7a7a7a" font-family="monospace" font-size="14" font-weight="600" opacity="0.5">R</text>
</svg>
