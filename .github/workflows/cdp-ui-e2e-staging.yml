# Post-deploy Playwright E2E against staging (OR-004 / ADR-0017).
#
# Railway reports an empty deployment_status.description; gate on commit status
# context "CDP - cdp" instead (see gate job).
# Waits up to 5 minutes for the full staging stack to report green /health, then runs
# responsive E2E + visual walkthrough and uploads the HTML gallery + PNGs as artifacts.
#
# GitHub environment secrets (Settings → Environments → CDP / production):
#   E2E_AUTH_EMAIL
#   E2E_AUTH_PASSWORD

name: cdp-ui-e2e-staging

on:
  deployment_status:
    states: [success]
  workflow_dispatch:

permissions:
  contents: read
  statuses: read

concurrency:
  group: cdp-ui-e2e-staging-${{ github.sha }}
  cancel-in-progress: true

env:
  E2E_BASE_URL: https://staging.neosofia.tech
  E2E_AUTH_BASE_URL: https://authentication.staging.neosofia.tech
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: Check CDP UI deploy
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'deployment_status'
    runs-on: ubuntu-24.04
    outputs:
      run_e2e: ${{ steps.check.outputs.run_e2e }}
    steps:
      - name: Detect CDP UI deployment
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sha="${{ github.event.deployment.sha }}"
          state="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/status" \
            --jq '[.statuses[] | select(.context == "CDP - cdp") | .state][0] // empty')"
          if [ "${state}" = "success" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "CDP - cdp status success for ${sha}"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "Skipping E2E (CDP - cdp status: ${state:-none})"
          fi

  e2e-staging:
    name: E2E staging + walkthrough
    needs: gate
    if: needs.gate.outputs.run_e2e == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: CDP / production
    env:
      E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
      E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for staging health
        run: bash e2e/scripts/wait-for-staging-health.sh

      - name: Verify E2E credentials
        run: |
          if [ -z "${E2E_AUTH_EMAIL:-}" ] || [ -z "${E2E_AUTH_PASSWORD:-}" ]; then
            echo "::error::Missing E2E_AUTH_EMAIL or E2E_AUTH_PASSWORD. Add both to Settings → Environments → CDP / production → Environment secrets."
            exit 1
          fi
          echo "E2E credentials present (email length ${#E2E_AUTH_EMAIL})."

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E (desktop + mobile, incl. walkthrough)
        id: e2e
        run: pnpm test:e2e:staging

      - name: List walkthrough outputs
        if: always()
        run: |
          ls -la test-results/ 2>/dev/null || true
          ls -la test-results/walkthrough/ 2>/dev/null || true

      - name: Upload walkthrough gallery
        if: always() && steps.e2e.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: walkthrough-staging
          path: |
            ui/test-results/walkthrough.html
            ui/test-results/walkthrough/
          if-no-files-found: error
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-${{ github.run_id }}
          path: ui/test-results/playwright/
          if-no-files-found: ignore
          retention-days: 14
