# Build and push the CDP User service runtime image (user base + product Cedar policies).
#
# Triggered by:
#   - Push of a SemVer tag (cdp-user/vMAJOR.MINOR.PATCH)
#   - Manual dispatch
#
# Produces:
#   ghcr.io/neosofia/cdp-user:<git-sha>
#   ghcr.io/neosofia/cdp-user:vMAJOR.MINOR.PATCH
#
# Tagging convention: cdp-user/vMAJOR.MINOR.PATCH
#   git tag -a cdp-user/v0.1.1 -m "cdp user runtime v0.1.1" && git push origin cdp-user/v0.1.1
#
# Pin USER_IMAGE in deploy/user/Dockerfile when the platform user release changes.
#
# Prerequisite: grant this repository Actions read access on the `user` GHCR package
# (Package settings → Manage Actions access → add `cdp`). See cdp/OPERATIONS.md.

name: cdp-user-build-push

on:
  push:
    tags:
      - 'cdp-user/*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push to GHCR
    uses: Neosofia/platform-workflows/.github/workflows/_build-push.yml@main
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/cdp-user
      context: .
      file: deploy/user/Dockerfile
      tag_prefix: cdp-user
      cache_scope: cdp-user
