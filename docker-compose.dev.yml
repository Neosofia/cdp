x-auth-image: &auth_image ghcr.io/neosofia/authentication:v0.30.0
x-user-image: &user_image ghcr.io/neosofia/user:v0.2.1

services:
  authentication-migrate:
    image: *auth_image
    container_name: cdp-authentication-migrate
    env_file:
      - ./.authentication.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      authentication-postgres:
        condition: service_healthy
    restart: "no"

  authentication:
    image: *auth_image
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
      authentication-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  authentication-bootstrap:
    image: *auth_image
    container_name: cdp-authentication-bootstrap
    profiles:
      - manual
    working_dir: /app
    command:
      - /app/.venv/bin/python
      - scripts/setup-env.py
      - --env-file
      - /tmp/.env
      - --stdout

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    env_file:
      - ./.authentication-postgres.env
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  capabilities:
    image: ghcr.io/neosofia/capabilities:v0.5.9
    container_name: cdp-capabilities
    env_file:
      - ./.capabilities.env
    volumes:
      - ./policies:/app/policies:ro
    ports:
      - "8019:8019"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8019/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  python-template:
    image: ghcr.io/neosofia/python-template:v0.7.2
    container_name: cdp-python-template
    env_file:
      - ./.template.env
    ports:
      - "8900:8900"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8900/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-postgres:
    image: postgres:18
    container_name: cdp-user-postgres
    env_file:
      - ./.user-postgres.env
    ports:
      - "5018:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_template -d cdp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-migrate:
    image: *user_image
    container_name: cdp-user-migrate
    env_file:
      - ./.user.env
    volumes:
      - ./roles/user-catalog.overlay.json:/app/roles/cdp-overlay.json:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      user-postgres:
        condition: service_healthy
    restart: "no"

  user:
    image: *user_image
    container_name: cdp-user
    env_file:
      - ./.user.env
    volumes:
      - ./roles/user-catalog.overlay.json:/app/roles/cdp-overlay.json:ro
    ports:
      - "8018:8018"
    depends_on:
      user-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8018/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    container_name: cdp-ui
    depends_on:
      authentication:
        condition: service_healthy
      capabilities:
        condition: service_healthy
      user:
        condition: service_healthy
    volumes:
      - ./ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./ui/.env

volumes:
  authentication_postgres_data:
  user_postgres_data:
