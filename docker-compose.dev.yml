# Top-level orchestrator — brings up the entire platform with one command.
# Each service owns its own docker-compose.yml (self-contained with its own DB).
# Add new services here as they are built.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# To run a single service independently:
#   cd services/<name> && docker compose up -d

services:
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: cdp-swagger-ui
    ports:
      - "8091:8080"   # browse API contracts — http://localhost:8091
    environment:
      SWAGGER_JSON: https://raw.githubusercontent.com/Neosofia/authentication/main/openapi.json
    restart: unless-stopped

  authentication:
    image: ghcr.io/neosofia/authentication:v0.5.0
    build:
      context: ../authentication
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    environment:
      ENV: development
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      DATABASE_URL: postgresql+psycopg://cdp:dev_only@authentication-postgres:5432/cdp_authentication
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
    volumes:
      - ./.authentication.env:/app/.env:ro

  authentication-bootstrap:
    image: ghcr.io/neosofia/authentication:v0.5.0
    container_name: cdp-authentication-bootstrap
    working_dir: /app
    command: ["bash", "-c", "ENV_FILE=/tmp/.env ./scripts/setup-env.sh >/tmp/setup-env.log && cat /tmp/.env"]

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    environment:
      POSTGRES_DB: cdp_authentication
      POSTGRES_USER: cdp
      POSTGRES_PASSWORD: dev_only
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  template-service:
    image: ghcr.io/neosofia/service-template:v0.2.0
    build:
      context: ../templates/python/service
    container_name: cdp-template-service
    env_file:
      - ../templates/python/service/.env.example
    environment:
      ENV: development
    ports:
      - "8018:8018"

  ui:
    build:
      context: ./ui
    container_name: cdp-ui
    ports:
      - "5173:5173"
    environment:
      VITE_AUTH_API_URL: http://authentication:8014
      VITE_TEMPLATE_API_URL: http://template-service:8018

volumes:
  authentication_postgres_data:
