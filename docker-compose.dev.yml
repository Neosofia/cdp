x-auth-image: &auth_image ghcr.io/neosofia/authentication:v0.16.1

services:
  authentication:
    image: *auth_image
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    environment:
      ENV: development
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql+psycopg://cdp:dev_only@authentication-postgres:5432/cdp_authentication
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
    volumes:
      - ./.authentication.env:/app/.env:ro

  authentication-bootstrap:
    image: *auth_image
    container_name: cdp-authentication-bootstrap
    profiles:
      - manual
    working_dir: /app
    command: ["bash", "-c", "ENV_FILE=/tmp/.env ./scripts/setup-env.sh >/tmp/setup-env.log && cat /tmp/.env"]

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    environment:
      POSTGRES_DB: cdp_authentication
      POSTGRES_USER: cdp
      POSTGRES_PASSWORD: dev_only
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  capabilities:
    image: ghcr.io/neosofia/capabilities:v0.1.2
    container_name: cdp-capabilities
    env_file:
      - ./.capabilities.env
    environment:
      ENV: development
    ports:
      - "8019:8019"

  python-template:
    image: ghcr.io/neosofia/python-template:v0.4.2
    container_name: cdp-python-template
    env_file:
      - ./.template.env
    environment:
      ENV: development
    ports:
      - "8018:8018"

  ui:
    build:
      context: ./ui
    container_name: cdp-ui
    depends_on:
      authentication:
        condition: service_started
      capabilities:
        condition: service_started
    volumes:
      - ./ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_AUTH_API_URL: http://authentication:8014
      VITE_CAPABILITIES_API_URL: http://capabilities:8019
      VITE_TEMPLATE_API_URL: http://python-template:8018
      VITE_AUTH_BASE_URL: http://localhost:8014

volumes:
  authentication_postgres_data:
