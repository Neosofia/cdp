x-auth-image: &auth_image ghcr.io/neosofia/authentication:v0.37.0
x-user-image: &user_image ghcr.io/neosofia/user:v0.8.2
x-chat-image: &chat_image ghcr.io/neosofia/chat:v0.6.2
x-care-episode-image: &care_episode_image ghcr.io/neosofia/care-episode:v0.7.1
x-capabilities-image: &capabilities_image ghcr.io/neosofia/capabilities:v0.7.3
x-template-image: &template_image ghcr.io/neosofia/python-template:v0.10.0

services:
  authentication-migrate:
    image: *auth_image
    container_name: cdp-authentication-migrate
    env_file:
      - ./.authentication.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      authentication-postgres:
        condition: service_healthy
    restart: "no"

  authentication:
    image: *auth_image
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
      authentication-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  authentication-bootstrap:
    image: *auth_image
    container_name: cdp-authentication-bootstrap
    profiles:
      - manual
    working_dir: /app
    command:
      - /app/.venv/bin/python
      - scripts/setup-env.py
      - --env-file
      - /tmp/.env
      - --stdout

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    env_file:
      - ./.authentication-postgres.env
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  capabilities:
    image: *capabilities_image
    container_name: cdp-capabilities
    env_file:
      - ./.capabilities.env
    volumes:
      - ./policies/capabilities:/app/policies:ro
    ports:
      - "8019:8019"
    depends_on:
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8019/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  python-template:
    image: *template_image
    container_name: cdp-python-template
    env_file:
      - ./.template.env
    ports:
      - "8900:8900"
    depends_on:
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8900/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-postgres:
    image: postgres:18
    container_name: cdp-user-postgres
    env_file:
      - ./.user-postgres.env
    ports:
      - "5018:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_template -d cdp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-migrate:
    image: *user_image
    container_name: cdp-user-migrate
    env_file:
      - ./.user.env
    volumes:
      - ./policies/user/role-catalog.json:/app/policies/role-catalog.json:ro
      - ./policies/user/cedar:/app/policies/cdp:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      user-postgres:
        condition: service_healthy
    restart: "no"

  user:
    image: *user_image
    container_name: cdp-user
    env_file:
      - ./.user.env
    volumes:
      - ./policies/user/role-catalog.json:/app/policies/role-catalog.json:ro
      - ./policies/user/cedar:/app/policies/cdp:ro
    ports:
      - "8018:8018"
    depends_on:
      user-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8018/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-postgres:
    image: postgres:18
    container_name: cdp-chat-postgres
    env_file:
      - ./.chat-postgres.env
    ports:
      - "5001:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_template -d cdp_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-migrate:
    image: *chat_image
    container_name: cdp-chat-migrate
    env_file:
      - ./.chat.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      chat-postgres:
        condition: service_healthy
    restart: "no"

  chat:
    image: *chat_image
    container_name: cdp-chat
    env_file:
      - ./.chat.env
    ports:
      - "8001:8001"
    depends_on:
      chat-postgres:
        condition: service_healthy
      chat-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  care-episode-postgres:
    image: postgres:18
    container_name: cdp-care-episode-postgres
    env_file:
      - ./.care-episode-postgres.env
    ports:
      - "5015:5432"
    volumes:
      - care_episode_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care_episode_template -d cdp_care_episode"]
      interval: 10s
      timeout: 5s
      retries: 5

  care-episode-migrate:
    image: *care_episode_image
    container_name: cdp-care-episode-migrate
    env_file:
      - ./.care-episode.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      care-episode-postgres:
        condition: service_healthy
    restart: "no"

  care-episode:
    image: *care_episode_image
    container_name: cdp-care-episode
    env_file:
      - ./.care-episode.env
    ports:
      - "8015:8015"
    depends_on:
      care-episode-postgres:
        condition: service_healthy
      care-episode-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8015/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    container_name: cdp-ui
    depends_on:
      authentication:
        condition: service_healthy
      capabilities:
        condition: service_healthy
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      care-episode:
        condition: service_healthy
    volumes:
      - ./ui:/app
      - ./policies/user/role-catalog.json:/app/policies/user/role-catalog.json:ro
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./ui/.env

volumes:
  authentication_postgres_data:
  user_postgres_data:
  chat_postgres_data:
  care_episode_postgres_data:
