services:
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: cdp-swagger-ui
    ports:
      - "8091:8080"
    environment:
      SWAGGER_JSON: https://raw.githubusercontent.com/Neosofia/authentication/main/openapi.json
    restart: unless-stopped

  authentication:
    image: ghcr.io/neosofia/authentication:v0.9.0
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    environment:
      ENV: development
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql+psycopg://cdp:dev_only@authentication-postgres:5432/cdp_authentication
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
    volumes:
      - ./.authentication.env:/app/.env:ro

  authentication-bootstrap:
    image: ghcr.io/neosofia/authentication:v0.9.0
    container_name: cdp-authentication-bootstrap
    profiles:
      - manual
    working_dir: /app
    command: ["bash", "-c", "ENV_FILE=/tmp/.env ./scripts/setup-env.sh >/tmp/setup-env.log && cat /tmp/.env"]

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    environment:
      POSTGRES_DB: cdp_authentication
      POSTGRES_USER: cdp
      POSTGRES_PASSWORD: dev_only
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  capabilities-service:
    image: ghcr.io/neosofia/capabilities-service:v0.1.0
    container_name: cdp-capabilities-service
    env_file:
      - ../capabilities/.env.example
    environment:
      ENV: development
    ports:
      - "8019:8019"

  template-service:
    image: ghcr.io/neosofia/service-template:v0.4.0
    container_name: cdp-template-service
    env_file:
      - ../templates/python/service/.env.example
    environment:
      ENV: development
    ports:
      - "8018:8018"

  ui:
    build:
      context: ./ui
    container_name: cdp-ui
    depends_on:
      authentication:
        condition: service_started
      capabilities-service:
        condition: service_started
    volumes:
      - ./ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_AUTH_API_URL: http://authentication:8014
      VITE_CAPABILITIES_API_URL: http://capabilities-service:8019
      VITE_TEMPLATE_API_URL: http://template-service:8018
      VITE_AUTH_BASE_URL: http://localhost:8014

volumes:
  authentication_postgres_data:
