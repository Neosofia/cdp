# Full CDP stack built from sibling service repos (not GHCR pins).
#
# Layout (repos as siblings of cdp/):
#   ../authentication
#   ../capabilities
#   ../templates/python/service   (python-template image)
#   ./ui                          (already in this repo)
#
#   docker compose -f docker-compose.local.yml up -d --build
#
# For pinned release images, use docker-compose.dev.yml instead.

include:
  - docker-compose.dev.yml

x-auth-local: &auth_local
  build:
    context: ../authentication
    dockerfile: Dockerfile
  image: neosofia/authentication:local
  volumes:
    - ../authentication/policies:/app/policies:ro

x-capabilities-local: &capabilities_local
  build:
    context: ../capabilities
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/capabilities:local

x-user-local: &user_local
  build:
    context: ../user
    dockerfile: Dockerfile
    target: runtime
    args:
      CDP_USER_POLICIES_IMAGE: neosofia/cdp-user-policies:local
  image: neosofia/user:local

x-template-local: &template_local
  build:
    context: ../templates/python/service
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/python-template:local

x-chat-local: &chat_local
  build:
    context: ../chat
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/chat:local

x-care-episode-local: &care_episode_local
  build:
    context: ../care-episode
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/care-episode:local

# Build CDP user policy bundle before the user service image (required once per policy change):
#   docker compose -f docker-compose.local.yml build cdp-user-policies
#   docker compose -f docker-compose.local.yml up -d --build
services:
  cdp-user-policies:
    build:
      context: ./policies/service-overrides/user
      dockerfile: Dockerfile
    image: neosofia/cdp-user-policies:local

  authentication-migrate:
    <<: *auth_local
    volumes:
      - ../authentication/policies:/app/policies:ro
      - ../templates/sql/audit:/app/audit-templates:ro
  authentication:
    <<: *auth_local
  authentication-bootstrap:
    <<: *auth_local
  capabilities:
    <<: *capabilities_local
    volumes:
      - ./policies:/app/policies:ro
  user-migrate:
    <<: *user_local
    container_name: cdp-user-migrate
    env_file:
      - ./.user.env
    volumes:
      - ./roles/user-catalog.overlay.json:/app/roles/cdp-overlay.json:ro
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      user-postgres:
        condition: service_healthy
    restart: "no"
  user:
    <<: *user_local
    container_name: cdp-user
    env_file:
      - ./.user.env
    volumes:
      - ./roles/user-catalog.overlay.json:/app/roles/cdp-overlay.json:ro
    ports:
      - "8018:8018"
    depends_on:
      user-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
  user-postgres:
    image: postgres:18
    container_name: cdp-user-postgres
    env_file:
      - ./.user-postgres.env
    ports:
      - "5018:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_template -d cdp_user"]
      interval: 10s
      timeout: 5s
      retries: 5
  chat-postgres:
    image: postgres:18
    container_name: cdp-chat-postgres
    env_file:
      - ./.chat-postgres.env
    ports:
      - "5001:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_template -d cdp_chat"]
      interval: 10s
      timeout: 5s
      retries: 5
  care-episode-postgres:
    image: postgres:18
    container_name: cdp-care-episode-postgres
    env_file:
      - ./.care-episode-postgres.env
    ports:
      - "5015:5432"
    volumes:
      - care_episode_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care_episode_template -d cdp_care_episode"]
      interval: 10s
      timeout: 5s
      retries: 5
  chat-migrate:
    <<: *chat_local
    container_name: cdp-chat-migrate
    env_file:
      - ./.chat.env
    volumes:
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      chat-postgres:
        condition: service_healthy
    restart: "no"
  care-episode-migrate:
    <<: *care_episode_local
    container_name: cdp-care-episode-migrate
    env_file:
      - ./.care-episode.env
    volumes:
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      care-episode-postgres:
        condition: service_healthy
    restart: "no"
  python-template:
    <<: *template_local
    env_file:
      - ./.template.env
    environment:
      PORT: "8900"
      # Document routes use in-memory data; URLs only satisfy Settings validation.
      APP_DATABASE_URL: postgresql+psycopg://app:local-dev-only@127.0.0.1:5432/python_template
      MIGRATION_DATABASE_URL: postgresql+psycopg://template:local-dev-only@127.0.0.1:5432/python_template
    volumes:
      - ../templates/python/service/policies:/app/policies:ro
  chat:
    <<: *chat_local
    container_name: cdp-chat
    env_file:
      - ./.chat.env
    volumes:
      - ../chat/policies:/app/policies:ro
    ports:
      - "8001:8001"
    depends_on:
      chat-postgres:
        condition: service_healthy
      chat-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
  care-episode:
    <<: *care_episode_local
    container_name: cdp-care-episode
    env_file:
      - ./.care-episode.env
    volumes:
      - ../care-episode/policies:/app/policies:ro
      - ../care-episode/src/data:/app/src/data:ro
    ports:
      - "8015:8015"
    depends_on:
      care-episode-postgres:
        condition: service_healthy
      care-episode-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy

volumes:
  user_postgres_data:
  chat_postgres_data:
  care_episode_postgres_data:
