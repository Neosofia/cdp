# =============================================================================
# LOCAL COMPOSE — ALL PLATFORM SERVICES MUST BE LOCAL BUILDS
# =============================================================================
#
# Do NOT pin GHCR release images here (ghcr.io/neosofia/*:v*).
# Do NOT `include: docker-compose.dev.yml` — dev compose is for pinned releases only.
# Every runnable application service must use a `build:` + `image: neosofia/*:local` anchor
# (authentication, capabilities, user, chat, care-episode, notification, python-template, ui).
#
# The only exceptions are infrastructure images (postgres:18) and build-only helpers
# (cdp-policies:local — scratch bundle consumed at capabilities and user image build time).
#
# If you need GHCR pins, change docker-compose.dev.yml — not this file.
#
# Full CDP stack built from sibling service repos.
#
# Layout (repos as siblings of cdp/):
#   ../authentication
#   ../capabilities
#   ../user
#   ../chat
#   ../care-episode
#   ../notification
#   ../templates/python/service
#   ./ui
#   ./policies  (cdp-policies image for capabilities and user builds)
#
#   docker compose -f docker-compose.local.yml build cdp-policies
#   docker compose -f docker-compose.local.yml up -d --build
#   ./scripts/compose-logs-json.sh docker-compose.local.yml
#
# For pinned release images, use docker-compose.dev.yml instead (never mix into this file).

x-auth-local: &auth_local
  build:
    context: ../authentication
    dockerfile: Dockerfile
  image: neosofia/authentication:local
  volumes:
    - ../authentication/policies:/app/policies:ro

x-capabilities-local: &capabilities_local
  build:
    context: ../capabilities
    dockerfile: Dockerfile
    target: runtime
    args:
      POLICIES_IMAGE: cdp-policies:local
  image: neosofia/capabilities:local

x-user-local: &user_local
  build:
    context: ../user
    dockerfile: Dockerfile
    target: runtime
    args:
      USER_PRODUCT_POLICIES_IMAGE: cdp-policies:local
  image: neosofia/user:local

x-template-local: &template_local
  build:
    context: ../templates/python/service
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/python-template:local

x-chat-local: &chat_local
  build:
    context: ../chat
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/chat:local

x-care-episode-local: &care_episode_local
  build:
    context: ../care-episode
    dockerfile: Dockerfile
    target: runtime
  image: neosofia/care-episode:local

x-notification-local: &notification_local
  build:
    context: ../notification
    dockerfile: Dockerfile
  image: neosofia/notification:local

services:
  # Policy-only image (FROM scratch). Build before capabilities/user:
  # `docker compose -f docker-compose.local.yml build cdp-policies`
  cdp-policies:
    build:
      context: ./policies
      dockerfile: Dockerfile
    image: cdp-policies:local
    profiles:
      - build

  authentication-postgres:
    image: postgres:18
    container_name: cdp-authentication-postgres
    env_file:
      - ./.authentication-postgres.env
    ports:
      - "5014:5432"
    volumes:
      - authentication_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp -d cdp_authentication"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentication-migrate:
    <<: *auth_local
    container_name: cdp-authentication-migrate
    env_file:
      - ./.authentication.env
    volumes:
      - ../authentication/policies:/app/policies:ro
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      authentication-postgres:
        condition: service_healthy
    restart: "no"

  authentication:
    <<: *auth_local
    container_name: cdp-authentication
    env_file:
      - ./.authentication.env
    ports:
      - "8014:8014"
    depends_on:
      authentication-postgres:
        condition: service_healthy
      authentication-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  authentication-bootstrap:
    <<: *auth_local
    container_name: cdp-authentication-bootstrap
    profiles:
      - manual
    working_dir: /app
    command:
      - /app/.venv/bin/python
      - scripts/setup-env.py
      - --env-file
      - /tmp/.env
      - --stdout

  capabilities:
    <<: *capabilities_local
    container_name: cdp-capabilities
    env_file:
      - ./.capabilities.env
    volumes:
      - ./policies/capabilities:/app/policies:ro
    ports:
      - "8019:8019"
    depends_on:
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8019/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  python-template:
    <<: *template_local
    container_name: cdp-python-template
    env_file:
      - ./.template.env
    volumes:
      - ../templates/python/service/policies:/app/policies:ro
    ports:
      - "8900:8900"
    depends_on:
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8900/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-postgres:
    image: postgres:18
    container_name: cdp-user-postgres
    env_file:
      - ./.user-postgres.env
    ports:
      - "5018:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_template -d cdp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-migrate:
    <<: *user_local
    container_name: cdp-user-migrate
    env_file:
      - ./.user.env
    volumes:
      - ./policies/user/role-catalog.json:/app/policies/role-catalog.json:ro
      - ./policies/user/role-catalog.json:/app/roles/cdp-overlay.json:ro
      - ./policies/user/cedar:/app/policies/cdp:ro
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      user-postgres:
        condition: service_healthy
    restart: "no"

  user:
    <<: *user_local
    container_name: cdp-user
    env_file:
      - ./.user.env
    volumes:
      - ./policies/user/role-catalog.json:/app/policies/role-catalog.json:ro
      - ./policies/user/role-catalog.json:/app/roles/cdp-overlay.json:ro
      - ./policies/user/cedar:/app/policies/cdp:ro
    ports:
      - "8018:8018"
    depends_on:
      user-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8018/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-postgres:
    image: postgres:18
    container_name: cdp-chat-postgres
    env_file:
      - ./.chat-postgres.env
    ports:
      - "5001:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_template -d cdp_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-migrate:
    <<: *chat_local
    container_name: cdp-chat-migrate
    env_file:
      - ./.chat.env
    volumes:
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      chat-postgres:
        condition: service_healthy
    restart: "no"

  chat:
    <<: *chat_local
    container_name: cdp-chat
    env_file:
      - ./.chat.env
    volumes:
      - ../chat/policies:/app/policies:ro
    ports:
      - "8001:8001"
    depends_on:
      chat-postgres:
        condition: service_healthy
      chat-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  care-episode-postgres:
    image: postgres:18
    container_name: cdp-care-episode-postgres
    env_file:
      - ./.care-episode-postgres.env
    ports:
      - "5015:5432"
    volumes:
      - care_episode_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care_episode_template -d cdp_care_episode"]
      interval: 10s
      timeout: 5s
      retries: 5

  care-episode-migrate:
    <<: *care_episode_local
    container_name: cdp-care-episode-migrate
    env_file:
      - ./.care-episode.env
    volumes:
      - ../templates/sql/audit:/app/audit-templates:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      care-episode-postgres:
        condition: service_healthy
    restart: "no"

  notification:
    <<: *notification_local
    container_name: cdp-notification
    env_file:
      - ./.notification.env
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  care-episode:
    <<: *care_episode_local
    container_name: cdp-care-episode
    env_file:
      - ./.care-episode.env
    volumes:
      - ../care-episode/policies:/app/policies:ro
      - ../care-episode/src/data:/app/src/data:ro
    ports:
      - "8015:8015"
    depends_on:
      care-episode-postgres:
        condition: service_healthy
      care-episode-migrate:
        condition: service_completed_successfully
      authentication:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8015/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: ./ui
      target: development
      args:
        UI_DEV: "1"
    image: cdp-ui:local
    container_name: cdp-ui
    depends_on:
      authentication:
        condition: service_healthy
      capabilities:
        condition: service_healthy
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      care-episode:
        condition: service_healthy
    entrypoint: ["pnpm", "run", "dev"]
    volumes:
      - ./ui:/app
      - ./policies/user/role-catalog.json:/app/policies/user/role-catalog.json:ro
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./ui/.env

volumes:
  authentication_postgres_data:
  user_postgres_data:
  chat_postgres_data:
  care_episode_postgres_data:
